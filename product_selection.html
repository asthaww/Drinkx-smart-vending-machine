<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vending Machine - Product Selection</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: #f9f9f9;
        }

        .product-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.15);
        }

        .product-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .product-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .product-card p {
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4CAF50;
        }

        .product-card.selected .product-price {
            color: #fff;
        }

        .pay-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
            min-width: 200px;
        }

        .pay-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .pay-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥤 Vending Machine</h1>
            <p>Select your favorite beverage and pay to dispense</p>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <button class="pay-button" id="payButton" onclick="startPayment()" disabled>
            Select a Product to Continue
        </button>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        let selectedProduct = null;

        // Load products on page load
        window.onload = function() {
            loadProducts();
        };

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                const productsGrid = document.getElementById('productsGrid');
                productsGrid.innerHTML = '';

                for (const [id, product] of Object.entries(products)) {
                    const productCard = document.createElement('div');
                    productCard.className = 'product-card';
                    productCard.onclick = () => selectProduct(parseInt(id));
                    
                    productCard.innerHTML = `
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="product-price">₹${(product.price / 100).toFixed(2)}</div>
                    `;
                    
                    productCard.setAttribute('data-product-id', id);
                    productsGrid.appendChild(productCard);
                }
            } catch (error) {
                showStatus('Error loading products: ' + error.message, 'error');
            }
        }

        function selectProduct(productId) {
            // Remove previous selection
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });

            // Select current product
            const selectedCard = document.querySelector(`[data-product-id="${productId}"]`);
            selectedCard.classList.add('selected');
            
            selectedProduct = productId;
            
            // Update pay button
            const payButton = document.getElementById('payButton');
            payButton.disabled = false;
            payButton.textContent = `Pay for ${selectedCard.querySelector('h3').textContent}`;
            
            console.log('Selected product:', productId);
        }

        async function startPayment() {
            if (!selectedProduct) {
                showStatus('Please select a product first', 'error');
                return;
            }

            try {
                showStatus('Creating order...', 'info');

                const orderRes = await fetch('/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_id: selectedProduct })
                });

                const order = await orderRes.json();
                if (order.error) {
                    showStatus("Error creating order: " + order.error, 'error');
                    return;
                }

                const options = {
                    key: order.key_id,
                    amount: order.amount,
                    currency: order.currency,
                    name: "Vending Machine",
                    description: `Purchase: ${order.product_name}`,
                    order_id: order.order_id,
                    handler: async function (response) {
                        try {
                            showStatus('Verifying payment...', 'info');
                            
                            const verifyRes = await fetch('/verify-payment', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    ...response,
                                    product_id: selectedProduct
                                })
                            });

                            const result = await verifyRes.json();
                            if (result.status === 'Payment Successful') {
                                showStatus(`✅ Payment successful! Dispensing ${result.product_name}... Please wait for your beverage.`, 'success');
                                
                                // Reset selection after successful payment
                                setTimeout(() => {
                                    resetSelection();
                                }, 3000);
                            } else {
                                showStatus("❌ Payment verification failed.", 'error');
                            }
                        } catch (error) {
                            showStatus("❌ Error verifying payment: " + error.message, 'error');
                        }
                    },
                    prefill: {
                        name: "",
                        email: "",
                        contact: ""
                    },
                    theme: {
                        color: "#667eea"
                    },
                    modal: {
                        ondismiss: function() {
                            showStatus('Payment cancelled', 'error');
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.open();

            } catch (error) {
                showStatus("❌ Error starting payment: " + error.message, 'error');
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status-message status-${type}`;
            statusDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds for success/error messages
            if (type !== 'info') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }

        function resetSelection() {
            selectedProduct = null;
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.textContent = 'Select a Product to Continue';
            
            document.getElementById('statusMessage').style.display = 'none';
        }
    </script>
</body>
</html>
